<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitClone Life Simulator</title>
    <style>
        :root {
            --bg-color: #f2f2f7;
            --text-color: #1c1c1e;
            --header-bg: #ffffff;
            --primary: #34c759;
            --danger: #ff3b30;
            --warning: #ffcc00;
            --intel: #007aff;
            --border: #e5e5ea;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Mobile Phone Simulator Container */
        #mobile-container {
            width: 400px;
            height: 850px;
            background-color: var(--bg-color);
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            border: 8px solid #111;
        }

        /* Top Header */
        header {
            background-color: var(--header-bg);
            padding: 20px 20px 10px 20px;
            border-bottom: 1px solid var(--border);
            text-align: center;
            z-index: 10;
        }
        #player-name { font-size: 22px; font-weight: 800; margin: 0 0 5px 0; }
        #player-finances { font-size: 16px; color: #34c759; font-weight: 600; margin: 0; }

        /* The Main Life Log */
        #life-log {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-color: var(--bg-color);
        }

        .year-block {
            background: #fff;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .year-header {
            font-size: 18px;
            font-weight: 700;
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 8px;
            margin-bottom: 10px;
            color: var(--text-color);
        }
        
        .log-item {
            font-size: 15px;
            margin-bottom: 8px;
            line-height: 1.4;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        /* Stat Bars Area */
        #stat-container {
            background: var(--header-bg);
            padding: 15px 20px;
            border-top: 1px solid var(--border);
        }
        .stat-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
        }
        .stat-label { width: 80px; }
        .stat-bar-bg {
            flex: 1;
            height: 14px;
            background: #e5e5ea;
            border-radius: 7px;
            overflow: hidden;
            position: relative;
        }
        .stat-fill {
            height: 100%;
            border-radius: 7px;
            transition: width 0.4s ease;
        }

        /* Bottom Navigation & Age Button */
        #bottom-nav {
            background: var(--header-bg);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 15px 10px 25px 10px;
            border-top: 1px solid var(--border);
        }
        .nav-btn {
            background: none;
            border: none;
            font-size: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: #8e8e93;
            cursor: pointer;
        }
        .nav-btn span { font-size: 11px; font-weight: 600; }
        
        #age-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 70px;
            height: 70px;
            border-radius: 35px;
            font-size: 30px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(52, 199, 89, 0.4);
            transition: transform 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #age-btn:active { transform: scale(0.95); }

        /* Modals for Events / Menus */
        .modal-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-card {
            background: white;
            width: 85%;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .modal-title { font-size: 20px; font-weight: bold; margin-top: 0; }
        .modal-body { font-size: 16px; margin: 15px 0; line-height: 1.4; color: #333; }
        .modal-options { display: flex; flex-direction: column; gap: 10px; }
        .modal-btn {
            background: #f2f2f7;
            border: 1px solid #d1d1d6;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .modal-btn:hover { background: #e5e5ea; }
        .modal-btn.primary { background: var(--primary); color: white; border: none; }
    </style>
</head>
<body>

    <div id="mobile-container">
        <header>
            <h1 id="player-name">Generating...</h1>
            <p id="player-finances">Bank: $0</p>
        </header>

        <div id="life-log">
            </div>

        <div id="stat-container">
            <div class="stat-row">
                <span class="stat-label">Happiness</span>
                <div class="stat-bar-bg"><div class="stat-fill" id="stat-hap" style="background:var(--primary); width:100%"></div></div>
            </div>
            <div class="stat-row">
                <span class="stat-label">Health</span>
                <div class="stat-bar-bg"><div class="stat-fill" id="stat-hea" style="background:var(--primary); width:100%"></div></div>
            </div>
            <div class="stat-row">
                <span class="stat-label">Smarts</span>
                <div class="stat-bar-bg"><div class="stat-fill" id="stat-sma" style="background:var(--intel); width:100%"></div></div>
            </div>
            <div class="stat-row">
                <span class="stat-label">Looks</span>
                <div class="stat-bar-bg"><div class="stat-fill" id="stat-loo" style="background:var(--warning); width:100%"></div></div>
            </div>
        </div>

        <nav id="bottom-nav">
            <button class="nav-btn" onclick="ui.showWIP('Activities')">🎭<span>Activities</span></button>
            <button class="nav-btn" onclick="ui.showWIP('Relationships')">👥<span>Relations</span></button>
            <button id="age-btn" onclick="game.ageUp()">➕</button>
            <button class="nav-btn" onclick="ui.showWIP('Occupation')">💼<span>Jobs</span></button>
            <button class="nav-btn" onclick="ui.showWIP('Assets')">🏠<span>Assets</span></button>
        </nav>

        <div id="event-modal" class="modal-overlay">
            <div class="modal-card">
                <h2 id="modal-title" class="modal-title">Event</h2>
                <div id="modal-body" class="modal-body">Text goes here.</div>
                <div id="modal-options" class="modal-options"></div>
            </div>
        </div>
    </div>

    <script>
        // --- DATA & CONTENT GENERATORS ---
        const firstNames = ["Taylor", "Jordan", "Casey", "Alex", "Morgan", "Riley", "Sam", "Jamie"];
        const lastNames = ["Smith", "Johnson", "Williams", "Brown", "Jones", "Garcia", "Miller"];
        
        // Age-specific random text databases
        const eventsDB = {
            infant: [
                "🍼 You took your first steps!",
                "🧸 You started playing with wooden blocks.",
                "🗣️ You said your first word: 'Applesauce'.",
                "🤢 You threw up all over your mother.",
                "😭 You cried all night for absolutely no reason."
            ],
            child: [
                "🎒 You started elementary school.",
                "🖍️ You ate a green crayon.",
                "🚲 You learned how to ride a bike.",
                "🦷 You lost your first tooth.",
                "🎮 You got highly addicted to a mobile game."
            ],
            teen: [
                "🏫 You started high school.",
                "💔 Your middle-school crush rejected you.",
                "🚗 You started taking driving lessons.",
                "📱 You spent 14 hours looking at social media.",
                "🍕 You developed terrible acne."
            ],
            adult: [
                "☕ You felt exhausted and drank three cups of coffee.",
                "💼 You realized taxes are incredibly confusing.",
                "🏋️ You considered going to the gym, but took a nap instead.",
                "🛒 You went grocery shopping and forgot the one thing you needed.",
                "📺 You binge-watched a 10-season show in one weekend."
            ]
        };

        // Random interactive pop-up events
        const randomPopups = [
            {
                ageMin: 5, ageMax: 12,
                title: "Bully Encounter",
                text: "A kid named Braden is demanding you give him your lunch money.",
                options: [
                    { text: "👊 Fight him", effect: () => { game.modStat('health', -10); game.modStat('happiness', 10); game.log("You fought Braden. You got a black eye, but kept your money."); } },
                    { text: "💸 Give him the money", effect: () => { game.modStat('happiness', -20); game.log("You gave Braden your lunch money and went hungry."); } },
                    { text: "🏃 Run away", effect: () => { game.log("You ran away safely."); } }
                ]
            },
            {
                ageMin: 18, ageMax: 100,
                title: "Lost Wallet",
                text: "You found a designer wallet on the street containing $400 in cash.",
                options: [
                    { text: "💰 Keep the cash", effect: () => { game.state.money += 400; game.modStat('happiness', 15); game.log("You pocketed the $400. Finders keepers!"); } },
                    { text: "👮 Turn it into the police", effect: () => { game.modStat('happiness', 5); game.log("You did the right thing and turned the wallet in."); } }
                ]
            },
            {
                ageMin: 18, ageMax: 100,
                title: "Bad Flu",
                text: "You woke up with a high fever and a terrible cough.",
                options: [
                    { text: "🛏️ Stay in bed", effect: () => { game.modStat('health', -5); game.log("You rested and fought off the worst of the flu."); } },
                    { text: "💊 Go to the doctor ($50)", effect: () => { 
                        if(game.state.money >= 50) { game.state.money -= 50; game.modStat('health', 10); game.log("The doctor gave you antibiotics."); }
                        else { game.modStat('health', -15); game.log("You couldn't afford the doctor and got much sicker."); }
                    }}
                ]
            }
        ];

        // --- CORE GAME ENGINE ---
        class GameEngine {
            constructor() {
                this.state = {
                    name: `${firstNames[Math.floor(Math.random()*firstNames.length)]} ${lastNames[Math.floor(Math.random()*lastNames.length)]}`,
                    age: 0,
                    money: 0,
                    stats: {
                        hap: 70 + Math.floor(Math.random() * 30),
                        hea: 80 + Math.floor(Math.random() * 20),
                        sma: 20 + Math.floor(Math.random() * 80),
                        loo: 20 + Math.floor(Math.random() * 80)
                    },
                    currentYearLog: []
                };
            }

            init() {
                document.getElementById('player-name').innerText = this.state.name;
                this.updateUI();
                
                // Starting log
                this.log(`👶 You were born in a hospital.`);
                this.log(`🧬 You are a male.`);
                this.log(`👩‍👦 Your mother is 28 years old.`);
                this.renderYearBlock();
            }

            updateUI() {
                document.getElementById('player-finances').innerText = `Bank: $${this.state.money.toLocaleString()}`;
                
                ['hap', 'hea', 'sma', 'loo'].forEach(stat => {
                    const val = this.state.stats[stat];
                    const bar = document.getElementById(`stat-${stat}`);
                    bar.style.width = `${val}%`;
                    
                    // Color changing based on value
                    if(val < 30) bar.style.background = 'var(--danger)';
                    else if (val < 60) bar.style.background = 'var(--warning)';
                    else if (stat === 'sma') bar.style.background = 'var(--intel)';
                    else bar.style.background = 'var(--primary)';
                });
            }

            modStat(stat, amount) {
                this.state.stats[stat] = Math.max(0, Math.min(100, this.state.stats[stat] + amount));
            }

            log(text) {
                this.state.currentYearLog.push(text);
            }

            renderYearBlock() {
                if (this.state.currentYearLog.length === 0) return;

                const logContainer = document.getElementById('life-log');
                const block = document.createElement('div');
                block.className = 'year-block';
                
                const header = document.createElement('div');
                header.className = 'year-header';
                header.innerText = `Age ${this.state.age}`;
                block.appendChild(header);

                this.state.currentYearLog.forEach(txt => {
                    const item = document.createElement('div');
                    item.className = 'log-item';
                    item.innerHTML = txt;
                    block.appendChild(item);
                });

                logContainer.appendChild(block);
                this.state.currentYearLog = []; // Reset for next year

                // Auto-scroll to bottom
                setTimeout(() => { logContainer.scrollTop = logContainer.scrollHeight; }, 50);
            }

            triggerRandomPopup() {
                // Filter valid popups for current age
                const validPopups = randomPopups.filter(p => this.state.age >= p.ageMin && this.state.age <= p.ageMax);
                if (validPopups.length > 0 && Math.random() < 0.35) { // 35% chance of an interactive popup
                    const popup = validPopups[Math.floor(Math.random() * validPopups.length)];
                    ui.showModal(popup.title, popup.text, popup.options);
                    return true;
                }
                return false;
            }

            generateBackgroundEvents() {
                let category = "adult";
                if (this.state.age < 4) category = "infant";
                else if (this.state.age < 13) category = "child";
                else if (this.state.age < 18) category = "teen";

                // Pick 1 to 3 random flavor texts
                const eventCount = 1 + Math.floor(Math.random() * 2);
                for(let i=0; i<eventCount; i++) {
                    const randomTxt = eventsDB[category][Math.floor(Math.random() * eventsDB[category].length)];
                    this.log(randomTxt);
                }
            }

            ageUp() {
                if(this.state.stats.hea <= 0) return; // Dead

                this.state.age++;
                
                // Passive aging effects
                if(this.state.age > 18) this.state.money += Math.floor(Math.random() * 500); // Random passive income
                if(this.state.age > 50) this.modStat('hea', -Math.floor(Math.random() * 4)); // Health decline
                
                this.generateBackgroundEvents();

                // Check for popups; if none, just render the block and update UI
                if (!this.triggerRandomPopup()) {
                    this.renderYearBlock();
                    this.updateUI();
                    this.checkDeath();
                }
            }

            checkDeath() {
                if (this.state.stats.hea <= 0 || this.state.age > 100 + Math.random()*15) {
                    this.state.stats.hea = 0;
                    this.updateUI();
                    ui.showModal("💀 You Died", `You passed away at the age of ${this.state.age}.<br><br>Final Bank Balance: $${this.state.money.toLocaleString()}`, [
                        { text: "🔄 Start New Life", effect: () => location.reload() }
                    ]);
                }
            }
        }

        // --- UI MANAGER ---
        const ui = {
            showModal: (title, body, options) => {
                document.getElementById('modal-title').innerHTML = title;
                document.getElementById('modal-body').innerHTML = body;
                
                const optsContainer = document.getElementById('modal-options');
                optsContainer.innerHTML = '';
                
                options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'modal-btn';
                    btn.innerHTML = opt.text;
                    btn.onclick = () => {
                        document.getElementById('event-modal').style.display = 'none';
                        opt.effect();
                        game.renderYearBlock();
                        game.updateUI();
                        game.checkDeath();
                    };
                    optsContainer.appendChild(btn);
                });

                document.getElementById('event-modal').style.display = 'flex';
            },

            showWIP: (menuName) => {
                ui.showModal(`🚧 Work in Progress`, `The <b>${menuName}</b> menu is not yet fully implemented in this base engine block.`, [
                    { text: "Close", effect: () => {} }
                ]);
            }
        };

        // Boot
        const game = new GameEngine();
        window.onload = () => game.init();

    </script>
</body>
</html>
